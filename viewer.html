const DOW=['日','月','火','水','木','金','土'];
const sf=document.getElementById('sf'),lf=document.getElementById('lf');
staff.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sf.appendChild(o);});
locs.forEach(l=>{const o=document.createElement('option');o.value=l.id;o.textContent=l.name;lf.appendChild(o);});
function showTab(t){
  document.getElementById('tab-shift').style.display=t==='shift'?'block':'none';
  document.getElementById('tab-cal').style.display=t==='cal'?'block':'none';
  document.getElementById('shift-ctrl').style.display=t==='shift'?'flex':'none';
  document.querySelectorAll('.htab').forEach((b,i)=>b.classList.toggle('active',(t==='shift'&&i===0)||(t==='cal'&&i===1)));
  if(t==='cal')renderCal();
}
function af(){const v=document.getElementById('vm').value,sid=sf.value,lid=lf.value;document.getElementById('tv').style.display=v==='table'?'block':'none';document.getElementById('lv').style.display=v==='list'?'block':'none';v==='table'?rt(sid,lid):rl(sid,lid);}
function hd(){return'<thead><tr><th style="text-align:left;min-width:80px;">名前/場所</th>'+Array.from({length:days},(_,i)=>{const d=i+1,dw=DOW[new Date(y,m-1,d).getDay()];return'<th class="'+(dw==='日'||dw==='土'?'dh':'')+'">' +d+'<br><span style="font-size:9px;">'+dw+'</span></th>';}).join('')+'</tr></thead>';}
function cellLoc(d,l){
  if(!(ld[l.id]||[]).includes(d))return'<td class="ch">―</td>';
  const aid=as[l.id]?.[d];
  if(aid===-1)return'<td class="ch">―</td>';
  if(!aid||aid===null)return'<td class="cu">未</td>';
  const s=staff.find(x=>x.id===aid);
  return'<td class="cw">'+(s?s.abbr:'?')+'</td>';
}
function rt(sid,lid){
  const fl=lid==='all'?locs:locs.filter(l=>String(l.id)===lid);
  const fs=sid==='all'?staff:staff.filter(s=>String(s.id)===sid);
  document.getElementById('lt').innerHTML=hd()+'<tbody>'+fl.map(l=>'<tr><td style="background:#EEEDFE;color:#3C3489;font-weight:500;white-space:nowrap;">'+l.name+'</td>'+Array.from({length:days},(_,i)=>{
    const d=i+1,aid=as[l.id]?.[d];
    if(sid!=='all'&&aid>0&&String(aid)!==sid)return'<td class="co">―</td>';
    return cellLoc(d,l);
  }).join('')+'</tr>').join('')+'</tbody>';
  document.getElementById('st').innerHTML=hd()+'<tbody>'+fs.map(s=>{
    return'<tr><td style="white-space:nowrap;"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+s.color+';margin-right:4px;vertical-align:middle;"></span>'+s.abbr+'</td>'+Array.from({length:days},(_,i)=>{
      const d=i+1,v=(sc[s.id]||{})[d];
      if(lid!=='all'&&v){const l=locs.find(x=>x.name===v);if(l&&String(l.id)!==lid)return'<td class="co">―</td>';}
      if(v){const l=locs.find(x=>x.name===v);return'<td class="cw" title="'+v+'">'+(l?l.abbr:v.slice(0,3))+'</td>';}
      return'<td class="co">―</td>';
    }).join('')+'</tr>';
  }).join('')+'</tbody>';
}
function rl(sid,lid){
  const fl=lid==='all'?locs:locs.filter(l=>String(l.id)===lid);
  let h='';
  for(let d=1;d<=days;d++){
    const dow=new Date(y,m-1,d).getDay(),dw=DOW[dow],isH=dow===0||dow===6;
    const al=fl.filter(l=>(ld[l.id]||[]).includes(d));
    if(!al.length)continue;
    const rows=al.map(l=>{
      const aid=as[l.id]?.[d];
      if(aid===-1)return'';
      if(sid!=='all'&&String(aid)!==sid)return'';
      const s=staff.find(x=>x.id===aid);
      return'<div class="ar"><span class="lp">'+l.name+'</span><span class="sn2">'+(s?s.name:'<span style="color:#A32D2D;">未割当</span>')+'</span></div>';
    }).filter(Boolean).join('');
    if(!rows&&sid!=='all')continue;
    h+='<div class="dc"><div class="dh2" style="color:'+(isH?'#c0392b':'#1a1a1a')+';">'+d+'日（'+dw+'）</div>'+(rows||'<div class="nr">出店なし</div>')+'</div>';
  }
  document.getElementById('lc').innerHTML=h||'<div class="nr">表示する情報がありません</div>';
}
function renderCal(){
  // 凡例
  document.getElementById('legend-area').innerHTML=staff.map(s=>'<div class="leg"><div class="leg-dot" style="background:'+s.color+'"></div><span>'+s.abbr+'</span><span style="color:#888;font-size:10px;">'+s.name+'</span></div>').join('');
  const firstDow=new Date(y,m-1,1).getDay();
  const dows=DOW.map((d,i)=>'<div class="cal-dow" style="color:'+(i===0?'#c0392b':i===6?'#2980b9':'#666')+'">'+d+'</div>').join('');
  let cells=dows;
  for(let i=0;i<firstDow;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    const dw=new Date(y,m-1,d).getDay(),isH=dw===0||dw===6;
    const al=locs.filter(l=>(ld[l.id]||[]).includes(d));
    const entries=al.map(l=>{
      const aid=as[l.id]?.[d];
      if(!aid||aid<=0)return'';
      const s=staff.find(x=>x.id===aid);if(!s)return'';
      const hex=s.color.replace('#','');
      const r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
      const tc=(0.299*r+0.587*g+0.114*b)/255>0.5?'#1a1a1a':'white';
      return'<div class="cal-entry" style="background:'+s.color+';color:'+tc+';" title="'+l.name+'：'+s.name+'"><span style="opacity:0.8;font-size:9px;">'+l.abbr+'</span> '+s.abbr+'</div>';
    }).filter(Boolean).join('');
    cells+='<div class="cal-day'+(isH?' hol':'')+'"><div class="cal-dn" style="color:'+(isH?'#c0392b':'#1a1a1a')+';">'+d+'</div>'+(entries||'<div style="color:#ddd;font-size:9px;">―</div>')+'</div>';
  }
  document.getElementById('cal-grid').innerHTML=cells;
}
