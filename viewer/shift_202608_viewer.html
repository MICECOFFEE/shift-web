  const section=(sec[l.id]||{})[d]||'';
  const dot=section?'<span style="position:absolute;top:1px;right:1px;width:5px;height:5px;border-radius:50%;background:#F59E0B;pointer-events:none;"></span>':'';
  const tip=(s?s.abbr:'?')+(section?' ['+section+']':'');
  const onclk=section?'onclick="showSecPopup(event,this)" data-sec="'+section+'" data-loc="'+l.name+'"':'';
  return'<td class="cw" style="position:relative;cursor:'+(section?'pointer':'default')+';" '+onclk+' title="'+tip+'">'+carLabel+(s?s.abbr:'?')+dot+'</td>';
}
function renderCarTable(){
  // 使用号車を収集（研修中除外）
  const usedCars=new Set();
  staff.forEach(s=>{
    for(let d=1;d<=days;d++){
      if(getRoleOnDayV(s,d)==='trainee')continue;
      const car=(co[s.id]||{})[d]!==undefined?(co[s.id]||{})[d]:(s.carNo||null);
      const v=(sc[s.id]||{})[d];
      if(car&&v)usedCars.add(car);
    }
  });
  const carList=Array.from(usedCars).sort((a,b)=>a-b);
  if(carList.length===0){
    document.getElementById('ct').innerHTML='<tr><td class="nr">号車データがありません</td></tr>';
    return;
  }
  let html='<thead><tr><th style="text-align:center;min-width:60px;position:sticky;top:0;left:0;z-index:3;background:#f5f5f0;">号車</th>'+
    Array.from({length:days},(_,i)=>{const d=i+1,dw=DOW[new Date(y,m-1,d).getDay()];return'<th style="position:sticky;top:0;z-index:2;background:#f5f5f0;" class="'+(dw==='日'||dw==='土'?'dh':'')+'">'+d+'<br><span style="font-size:9px;">'+dw+'</span></th>';}).join('')+
    '<th style="position:sticky;top:0;right:0;background:#f5f5f0;z-index:3;">計</th></tr></thead><tbody>';
  carList.forEach(carNo=>{
    let carTotal=0;
    html+='<tr><td class="sticky-col" style="text-align:center;font-weight:600;min-width:60px;">'+circledNum(carNo)+'号車</td>';
    for(let d=1;d<=days;d++){
      const s=staff.find(st=>{
        if(getRoleOnDayV(st,d)==='trainee')return false;
        const car=(co[st.id]||{})[d]!==undefined?(co[st.id]||{})[d]:(st.carNo||null);
        return car===carNo&&(sc[st.id]||{})[d];
      });
      if(!s){html+='<td class="co">―</td>';continue;}
      carTotal++;
      const v=(sc[s.id]||{})[d];
      const l=locs.find(x=>x.name===v);
      const abbr=l?l.abbr:v.slice(0,3);
      const section=l?(sec[l.id]||{})[d]||'':'';
      const dot=section?'<span style="position:absolute;top:1px;right:1px;width:5px;height:5px;border-radius:50%;background:#F59E0B;pointer-events:none;"></span>':'';
      const onclk=section?'onclick="showSecPopup(event,this)" data-sec="'+section+'" data-loc="'+v+'"':'';
      html+='<td class="cw" style="position:relative;cursor:'+(section?'pointer':'default')+';" '+onclk+' title="'+v+(section?' ['+section+']':'')+'：'+s.name+'">'+abbr+dot+'</td>';
    }
    html+='<td style="font-weight:500;">'+carTotal+'</td></tr>';
  });
  html+='</tbody>';
  document.getElementById('ct').innerHTML=html;
}
function rt(sid,lid){
  const fl=lid==='all'?locs:locs.filter(l=>String(l.id)===lid);
  const fs=sid==='all'?staff:staff.filter(s=>String(s.id)===sid);
  document.getElementById('lt').innerHTML=hd()+'<tbody>'+fl.map(l=>'<tr><td class="sticky-col-loc" style="color:#3C3489;font-weight:500;white-space:nowrap;min-width:100px;">'+l.name+'</td>'+Array.from({length:days},(_,i)=>{
    const d=i+1,aid=as[l.id]?.[d];
    if(sid!=='all'&&aid>0&&String(aid)!==sid)return'<td class="co">―</td>';
    return cellLoc(d,l);
  }).join('')+'</tr>').join('')+'</tbody>';
  document.getElementById('st').innerHTML=hd()+'<tbody>'+fs.map(s=>{
    return'<tr><td class="sticky-col" style="white-space:nowrap;min-width:100px;"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+s.color+';margin-right:4px;vertical-align:middle;"></span>'+s.name+'</td>'+Array.from({length:days},(_,i)=>{
      const d=i+1,v=(sc[s.id]||{})[d];
      if(lid!=='all'&&v){const l=locs.find(x=>x.name===v);if(l&&String(l.id)!==lid)return'<td class="co">―</td>';}
      if(v){
        const l=locs.find(x=>x.name===v);
        const car=(co[s.id]||{})[d]!==undefined?(co[s.id]||{})[d]:s.carNo;
        const carLabel=car?circledNum(car):'';
        const stSec=l?(sec[l.id]||{})[d]||'':'';
        const stDot=stSec?'<span style="position:absolute;top:1px;right:1px;width:5px;height:5px;border-radius:50%;background:#F59E0B;pointer-events:none;"></span>':'';
        const stOnclk=stSec?'onclick="showSecPopup(event,this)" data-sec="'+stSec+'" data-loc="'+(l?l.name:v)+'"':'';
        return'<td class="cw" style="position:relative;cursor:'+(stSec?'pointer':'default')+';" '+stOnclk+' title="'+v+(stSec?' ['+stSec+']':'')+'">'+carLabel+(l?l.abbr:v.slice(0,3))+stDot+'</td>';
      }
      return'<td class="co">―</td>';
    }).join('')+'</tr>';
  }).join('')+'</tbody>';
}
function rl(sid,lid){
  const fl=lid==='all'?locs:locs.filter(l=>String(l.id)===lid);
  let h='';
  for(let d=1;d<=days;d++){
    const dow=new Date(y,m-1,d).getDay(),dw=DOW[dow],isH=dow===0||dow===6;
    const al=fl.filter(l=>(ld[l.id]||[]).includes(d));
    if(!al.length)continue;
    const rows=al.map(l=>{
      const aid=as[l.id]?.[d];
      if(aid===-1)return'';
      if(sid!=='all'&&String(aid)!==sid)return'';
      const s=staff.find(x=>x.id===aid);
      const section=(sec[l.id]||{})[d]||'';
      const secBadge=section?'<span style="font-size:10px;color:#92400E;background:#FEF3C7;border-radius:4px;padding:1px 5px;margin-left:4px;">'+section+'</span>':'';
      return'<div class="ar"><span class="lp">'+l.name+secBadge+'</span><span class="sn2">'+(s?s.name:'<span style="color:#A32D2D;">未割当</span>')+'</span></div>';
    }).filter(Boolean).join('');
    if(!rows&&sid!=='all')continue;
    h+='<div class="dc"><div class="dh2" style="color:'+(isH?'#c0392b':'#1a1a1a')+';">'+d+'日（'+dw+'）</div>'+(rows||'<div class="nr">出店なし</div>')+'</div>';
  }
  document.getElementById('lc').innerHTML=h||'<div class="nr">表示する情報がありません</div>';
}
function renderCal(){
  // 凡例
  document.getElementById('legend-area').innerHTML=staff.map(s=>'<div class="leg"><div class="leg-dot" style="background:'+s.color+'"></div><span>'+s.abbr+'</span><span style="color:#888;font-size:10px;">'+s.name+'</span></div>').join('');
  const firstDow=new Date(y,m-1,1).getDay();
  const dows=DOW.map((d,i)=>'<div class="cal-dow" style="color:'+(i===0?'#c0392b':i===6?'#2980b9':'#666')+'">'+d+'</div>').join('');
  let cells=dows;
  for(let i=0;i<firstDow;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    const dw=new Date(y,m-1,d).getDay(),isH=dw===0||dw===6;
    const al=locs.filter(l=>(ld[l.id]||[]).includes(d));
    const entries=al.map(l=>{
      const aid=as[l.id]?.[d];
      if(!aid||aid<=0)return'';
      const s=staff.find(x=>x.id===aid);if(!s)return'';
      const hex=s.color.replace('#','');
      const r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
      const tc=(0.299*r+0.587*g+0.114*b)/255>0.5?'#1a1a1a':'white';
      const calSec=(sec[l.id]||{})[d]||'';
      return'<div class="cal-entry" style="background:'+s.color+';color:'+tc+';" title="'+l.name+(calSec?' ['+calSec+']':'')+'：'+s.name+'"><span style="opacity:0.8;font-size:9px;">'+l.abbr+'</span> '+s.abbr+'</div>';
    }).filter(Boolean).join('');
    cells+='<div class="cal-day'+(isH?' hol':'')+'"><div class="cal-dn" style="color:'+(isH?'#c0392b':'#1a1a1a')+';">'+d+'</div>'+(entries||'<div style="color:#ddd;font-size:9px;">―</div>')+'</div>';
  }
  document.getElementById('cal-grid').innerHTML=cells;
}

function showSecPopup(e,td){
  const section=td.dataset.sec||'';const locName=td.dataset.loc||'';
  if(!section)return;
  e.stopPropagation();
  const old=document.getElementById('sec-toast');if(old)old.remove();
  const toast=document.createElement('div');
  toast.id='sec-toast';
  toast.style.cssText='position:fixed;z-index:9999;background:rgba(30,20,60,0.92);color:white;padding:10px 16px;border-radius:10px;font-size:13px;max-width:220px;text-align:center;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.3);transition:opacity 0.3s;';
  toast.innerHTML='<div style="font-size:11px;opacity:0.75;margin-bottom:3px;">'+locName+'</div><div style="font-weight:600;">🏢 '+section+'</div>';
  const px=e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:window.innerWidth/2);
  const py=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:100);
  toast.style.left=Math.min(px,window.innerWidth-160)+'px';
  toast.style.top=Math.max(py-70,8)+'px';
  document.body.appendChild(toast);
  setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300);},2200);
}
document.addEventListener('click',()=>{const t=document.getElementById('sec-toast');if(t)t.remove();});
function printViewerPDF(){
  const locDatesP={};
  locs.forEach(l=>{locDatesP[l.id]=ld[l.id]||[];});
  const dupCarP={};
  for(let d=1;d<=days;d++){
    const cc={};
    staff.forEach(s=>{
      const car=(co[s.id]||{})[d]!==undefined?(co[s.id]||{})[d]:(s.carNo||null);
      if(!car||!sc[s.id]?.[d])return;
      cc[car]=(cc[car]||0)+1;
    });
    dupCarP[d]=new Set(Object.entries(cc).filter(([,n])=>n>1).map(([c])=>Number(c)));
  }
  const maxStLen=Math.max(...staff.map(s=>s.name.length),2);
  const maxLocLen=Math.max(...locs.map(l=>l.name.length),2);
  const nameW=Math.max(60,Math.max(maxStLen,maxLocLen)*7+8);
  const dayW=Array.from({length:days},(_,i)=>{
    const d=i+1;let mx=22;
    staff.forEach(s=>{
      const v=sc[s.id]?.[d];if(!v)return;
      const car=(co[s.id]||{})[d]!==undefined?(co[s.id]||{})[d]:s.carNo;
      const l=locs.find(x=>x.name===v);
      const abbr=l?l.abbr:v.slice(0,3);
      const len=(car?1:0)+abbr.length;
      if(len*6+4>mx)mx=len*6+4;
    });
    return Math.min(mx,50);
  });
  const hdrsP=Array.from({length:days},(_,i)=>{
    const d=i+1,dw=DOW[new Date(y,m-1,d).getDay()];
    const isH=dw==='日'||dw==='土';
    return'<th class="dc" style="width:'+dayW[i]+'px;font-size:7px;padding:1px;'+(isH?'color:#c0392b;':'')+'">'+d+'<br>'+dw+'</th>';
  }).join('');
  const locTableRows=locs.map(l=>{
    const total=(locDatesP[l.id]||[]).filter(d=>{const sid=(as[l.id]||{})[d];return sid&&sid>0;}).length;
    const cells=Array.from({length:days},(_,i)=>{
      const d=i+1;
      if(!(locDatesP[l.id]||[]).includes(d))return'<td class="dc hol">―</td>';
      const sid=(as[l.id]||{})[d];
      if(sid===-1||!sid)return'<td class="dc unas">'+(sid===-1?'―':'未')+'</td>';
      const s=staff.find(x=>x.id===sid);
      const car=(co[sid]||{})[d]!==undefined?(co[sid]||{})[d]:s?.carNo;
      const pDup=car&&dupCarP[d]?.has(car);
      const carLabel=car?(pDup?'<span style="color:#c0392b;font-weight:bold">'+circledNum(car)+'</span>':circledNum(car)):'';
      const mainLabel=s?s.abbr:'?';
      return'<td class="dc work">'+carLabel+mainLabel+'</td>';
    }).join('');
    return'<tr><td class="nc loc-name">'+l.name+'</td>'+cells+'<td class="tc">'+total+'</td></tr>';
  }).join('');
  const staffTableRows=staff.map(s=>{
    const sched=sc[s.id]||{};
    const cnt=Object.values(sched).filter(v=>v).length;
    const cells=Array.from({length:days},(_,i)=>{
      const d=i+1,v=sched[d];
      if(!v)return'<td class="dc off">―</td>';
      const car=(co[s.id]||{})[d]!==undefined?(co[s.id]||{})[d]:s.carNo;
      const pDupS=car&&dupCarP[d]?.has(car);
      const carLabel=car?(pDupS?'<span style="color:#c0392b;font-weight:bold">'+circledNum(car)+'</span>':circledNum(car)):'';
      const l=locs.find(x=>x.name===v);
      const abbr=l?l.abbr:v.slice(0,3);
      const isT=getRoleOnDayV(s,d)==='trainee';
      return'<td class="dc work">'+(isT?'🔰':'')+carLabel+abbr+'</td>';
    }).join('');
    return'<tr><td class="nc">'+s.name+'</td>'+cells+'<td class="tc">'+cnt+'</td></tr>';
  }).join('');
  const totalLocDays=locs.reduce((sum,l)=>sum+(locDatesP[l.id]||[]).filter(d=>{const sid=(as[l.id]||{})[d];return sid&&sid>0;}).length,0);
  const staffGrand=staff.reduce((sum,s)=>sum+Object.values(sc[s.id]||{}).filter(v=>v).length,0);
  // 号車別
  const usedCarsP=new Set();
  staff.forEach(s=>{
    for(let d=1;d<=days;d++){
      if(getRoleOnDayV(s,d)==='trainee')continue;
      const car=(co[s.id]||{})[d]!==undefined?(co[s.id]||{})[d]:(s.carNo||null);
      if(car&&sc[s.id]?.[d])usedCarsP.add(car);
    }
  });
  const carListP=Array.from(usedCarsP).sort((a,b)=>a-b);
  const carTableRows=carListP.map(carNo=>{
    let carTotal=0;
    const cells=Array.from({length:days},(_,i)=>{
      const d=i+1;
      const s=staff.find(st=>{
        if(getRoleOnDayV(st,d)==='trainee')return false;
        const car=(co[st.id]||{})[d]!==undefined?(co[st.id]||{})[d]:(st.carNo||null);
        return car===carNo&&sc[st.id]?.[d];
      });
      if(!s)return'<td class="dc off">―</td>';
      carTotal++;
      const v=sc[s.id][d];
      const l=locs.find(x=>x.name===v);
      const abbr=l?l.abbr:v.slice(0,3);
      return'<td class="dc work">'+abbr+'</td>';
    }).join('');
    return'<tr><td class="nc loc-name">'+circledNum(carNo)+'号車</td>'+cells+'<td class="tc">'+carTotal+'</td></tr>';
  }).join('');
  const carSectionHtml=carListP.length>0?(
    '<tr><td colspan="'+(days+2)+'" class="sec-hdr">号車別場所割当表</td></tr>'+
    '<tr class="thr"><th class="nc" style="text-align:left;">号車</th>'+hdrsP+'<th class="tc">計</th></tr>'+
    carTableRows
  ):'';
  const printHtml='<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"/>'+
    '<title>'+y+'年'+m+'月 シフト表</title>'+
    '<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:"Hiragino Sans",YuGothic,sans-serif;font-size:8px;padding:8mm;}'+
    'h2{font-size:12px;margin-bottom:4px;}table{border-collapse:collapse;table-layout:fixed;margin-bottom:4px;}'+
    'th,td{border:0.5px solid #ccc;padding:1px 2px;text-align:center;vertical-align:middle;overflow:hidden;white-space:nowrap;}'+
    'th{background:#f5f5f0;font-weight:500;}.nc{text-align:left;width:'+nameW+'px;min-width:'+nameW+'px;font-size:8px;white-space:nowrap;padding:1px 3px;}'+
    '.dc{font-size:7px;}.tc{width:18px;font-weight:bold;}.hol{background:#f5f5f0;color:#ccc;}.unas{background:#FAEEDA;color:#633806;}'+
    '.work{background:#E1F5EE;color:#085041;}.off{color:#ccc;}.loc-name{background:#EEEDFE;color:#3C3489;font-weight:bold;}'+
    '.summary{font-size:8px;color:#555;margin-bottom:6px;}.sec-hdr{background:#e8e8e8;font-weight:bold;font-size:9px;text-align:left;padding:3px 4px;color:#333;}'+
    '@media print{@page{size:A4 landscape;margin:6mm;}body{padding:0;}-webkit-print-color-adjust:exact;print-color-adjust:exact;}'+
    '</style></head><body>'+
    '<h2>'+y+'年'+m+'月 シフト表</h2>'+
    '<div class="summary">月間総出店: '+totalLocDays+'日　スタッフ総出勤: '+staffGrand+'日　場所数: '+locs.length+'　スタッフ数: '+staff.length+'名</div>'+
    '<table><colgroup><col style="width:'+nameW+'px">'+Array.from({length:days},(_,i)=>'<col style="width:'+dayW[i]+'px">').join('')+'<col style="width:18px"></colgroup>'+
    '<tbody><tr><td colspan="'+(days+2)+'" class="sec-hdr">場所別割当表</td></tr>'+
    '<tr class="thr"><th class="nc" style="text-align:left;">場所</th>'+hdrsP+'<th class="tc">計</th></tr>'+
    locTableRows+
    '<tr><td colspan="'+(days+2)+'" class="sec-hdr">スタッフ別出勤表</td></tr>'+
    '<tr class="thr"><th class="nc" style="text-align:left;">名前</th>'+hdrsP+'<th class="tc">計</th></tr>'+
    staffTableRows+carSectionHtml+
    '</tbody></table></body></html>';
  const w=window.open('','_blank');
  w.document.write(printHtml);
  w.document.close();
  w.onload=()=>{w.print();};
}
